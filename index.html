<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Aurentyr is an enduring institution that builds and stewards exceptional businesses across distinct sectors."
    />
    <meta name="theme-color" content="#16201d" />

    <!-- Security -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://formspree.io; frame-ancestors 'none';"
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Aurentyr" />
    <meta property="og:title" content="Aurentyr — An Enduring Institution" />
    <meta
      property="og:description"
      content="Aurentyr is an enduring institution that builds and stewards exceptional businesses across distinct sectors."
    />
    <meta property="og:url" content="https://aurentyr.github.io/" />
    <meta property="og:image" content="https://aurentyr.github.io/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Aurentyr — An Enduring Institution" />
    <meta
      name="twitter:description"
      content="Aurentyr is an enduring institution that builds and stewards exceptional businesses across distinct sectors."
    />
    <meta name="twitter:image" content="https://aurentyr.github.io/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Font preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <title>Aurentyr</title>

    <!-- GitHub Pages SPA: restore path from redirect -->
    <script>
      (function () {
        var redirect = sessionStorage.getItem("redirect");
        if (redirect) {
          sessionStorage.removeItem("redirect");
          var url = new URL(redirect);
          history.replaceState(null, "", url.pathname + url.search + url.hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
