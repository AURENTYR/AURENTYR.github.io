name: Smoke Test

on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]

jobs:
  smoke:
    name: Post-deploy smoke test
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Wait for Pages to propagate
        run: sleep 30

      - name: Check homepage
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://aurentyr.github.io/)
          echo "Homepage status: $STATUS"
          [ "$STATUS" = "200" ] || (echo "FAIL: homepage returned $STATUS" && exit 1)

      - name: Check /sitemap.xml
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://aurentyr.github.io/sitemap.xml)
          echo "Sitemap status: $STATUS"
          [ "$STATUS" = "200" ] || (echo "FAIL: sitemap returned $STATUS" && exit 1)

      - name: Check /robots.txt
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://aurentyr.github.io/robots.txt)
          echo "Robots status: $STATUS"
          [ "$STATUS" = "200" ] || (echo "FAIL: robots.txt returned $STATUS" && exit 1)

      - name: Check /favicon.svg
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://aurentyr.github.io/favicon.svg)
          echo "Favicon status: $STATUS"
          [ "$STATUS" = "200" ] || (echo "FAIL: favicon returned $STATUS" && exit 1)

      - name: Verify homepage contains expected content
        run: |
          BODY=$(curl -s https://aurentyr.github.io/)
          echo "$BODY" | grep -q "AURENTYR" || (echo "FAIL: homepage missing AURENTYR in content" && exit 1)
          echo "Content check passed"

      - name: Verify sitemap references correct domain
        run: |
          BODY=$(curl -s https://aurentyr.github.io/sitemap.xml)
          echo "$BODY" | grep -q "aurentyr.github.io" || (echo "FAIL: sitemap missing expected domain" && exit 1)
          echo "Sitemap domain check passed"

      - name: All checks passed
        run: echo "Smoke test complete — site is live and healthy."
